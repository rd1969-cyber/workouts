<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bob's Workout Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a1a2e; min-height: 100vh; }

  header {
    background: #022F65;
    color: white;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 1.3rem; letter-spacing: 0.5px; }
  header span { font-size: 0.85rem; color: #00D686; }

  .container { max-width: 700px; margin: 0 auto; padding: 20px 16px 60px; }

  .section-header {
    background: #022F65;
    color: white;
    padding: 12px 16px;
    border-radius: 10px 10px 0 0;
    font-size: 1rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 24px;
  }
  .section-header .badge {
    background: #00D686;
    color: #022F65;
    font-size: 0.7rem;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 20px;
  }

  .exercise-card {
    background: white;
    border-left: 4px solid #00D686;
    padding: 14px 16px;
    margin-bottom: 2px;
  }
  .exercise-card:last-child { border-radius: 0 0 10px 10px; }

  .ex-name { font-weight: 600; font-size: 0.95rem; }
  .ex-meta { font-size: 0.78rem; color: #666; margin-top: 2px; }

  /* Per-set rows */
  .sets-table { width: 100%; margin-top: 10px; border-collapse: collapse; }
  .sets-table th {
    font-size: 0.72rem;
    color: #888;
    font-weight: 600;
    text-align: left;
    padding: 2px 4px 6px;
    border-bottom: 1px solid #eee;
  }
  .sets-table td { padding: 5px 4px; vertical-align: middle; }

  .set-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid #ddd;
    background: white;
    font-size: 0.72rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    color: #999;
    display: flex; align-items: center; justify-content: center;
  }
  .set-btn.done { background: #00D686; border-color: #00D686; color: #022F65; }
  .set-btn.active { border-color: #022F65; color: #022F65; background: #e8f0ff; }

  .weight-input {
    width: 58px;
    padding: 5px 6px;
    border: 1.5px solid #ddd;
    border-radius: 6px;
    font-size: 0.82rem;
    text-align: center;
    background: #f9f9f9;
  }
  .weight-input:focus { outline: none; border-color: #022F65; background: white; }
  .unit-label { font-size: 0.72rem; color: #aaa; margin-left: 2px; }

  .reps-input {
    width: 50px;
    padding: 5px 6px;
    border: 1.5px solid #ddd;
    border-radius: 6px;
    font-size: 0.82rem;
    text-align: center;
    background: #f9f9f9;
  }
  .reps-input:focus { outline: none; border-color: #022F65; background: white; }

  /* Notes */
  .notes-toggle {
    font-size: 0.75rem;
    color: #022F65;
    cursor: pointer;
    margin-top: 8px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    opacity: 0.7;
  }
  .notes-toggle:hover { opacity: 1; }
  .notes-area {
    display: none;
    margin-top: 8px;
  }
  .notes-area textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: 0.82rem;
    font-family: inherit;
    resize: vertical;
    min-height: 56px;
    background: #fafafa;
    color: #333;
  }
  .notes-area textarea:focus { outline: none; border-color: #022F65; background: white; }
  .notes-area textarea::placeholder { color: #bbb; }

  /* Progress */
  .progress-bar-wrap {
    background: #e8e8e8;
    border-radius: 20px;
    height: 8px;
    margin: 18px 0 8px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #022F65, #00D686);
    border-radius: 20px;
    transition: width 0.4s ease;
  }
  .progress-label { font-size: 0.8rem; color: #555; text-align: right; margin-bottom: 4px; }

  /* Timer */
  .timer-section {
    background: white;
    border-radius: 12px;
    padding: 16px;
    margin-top: 24px;
    text-align: center;
    border: 2px solid #e0e0e0;
  }
  .timer-display { font-size: 2.4rem; font-weight: 800; color: #022F65; letter-spacing: 2px; margin: 8px 0; }
  .timer-controls { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
  .btn { padding: 8px 20px; border-radius: 8px; border: none; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: #022F65; color: white; }
  .btn-green { background: #00D686; color: #022F65; }
  .btn-gray { background: #e0e0e0; color: #555; }
  .rest-label { font-size: 0.8rem; color: #888; margin-top: 6px; }

  .complete-banner { display: none; background: #022F65; color: white; text-align: center; padding: 20px; border-radius: 12px; margin-top: 28px; }
  .complete-banner h2 { color: #00D686; font-size: 1.4rem; }
  .complete-banner p { margin-top: 6px; font-size: 0.9rem; color: #cdd; }
  .reset-row { text-align: center; margin-top: 18px; }

  @media (max-width: 500px) {
    .ex-name { font-size: 0.88rem; }
    .timer-display { font-size: 1.8rem; }
    .weight-input { width: 50px; }
  }
</style>
</head>
<body>

<header>
  <h1>💪 Home Workout Tracker</h1>
  <span id="date-display"></span>
</header>

<div class="container">

  <div class="progress-label" id="progress-label">0 of 0 sets complete</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>

  <!-- TIMER -->
  <div class="timer-section">
    <div style="font-weight:700; font-size:0.9rem; color:#022F65;">⏱ Rest Timer</div>
    <div class="timer-display" id="timer-display">01:30</div>
    <div class="timer-controls">
      <button class="btn btn-green" onclick="startTimer()">Start</button>
      <button class="btn btn-gray" onclick="resetTimer()">Reset</button>
      <button class="btn btn-primary" onclick="setTimer(90)">90s</button>
      <button class="btn btn-primary" onclick="setTimer(60)">60s</button>
    </div>
    <div class="rest-label">Auto-starts when a set is marked done</div>
  </div>

  <!-- SHOULDERS -->
  <div class="section-header">🏋️ Shoulders <span class="badge">3 SETS</span></div>
  <div id="shoulders"></div>

  <!-- ARMS -->
  <div class="section-header">💪 Arms <span class="badge">2 SETS</span></div>
  <div id="arms"></div>

  <!-- CORE -->
  <div class="section-header">🔥 Core <span class="badge">2 ROUNDS</span></div>
  <div id="core"></div>

  <div class="complete-banner" id="complete-banner">
    <h2>🎉 Workout Complete!</h2>
    <p id="complete-time"></p>
    <p style="margin-top:8px; font-size:0.82rem; color:#aac">All sets logged for today.</p>
  </div>

  <div class="reset-row" style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
    <button class="btn btn-green" onclick="exportCSV()">⬇ Export to CSV</button>
    <button class="btn btn-gray" onclick="resetWorkout()">↺ Reset Workout</button>
  </div>

</div>

<script>
const workoutData = {
  shoulders: [
    { name: 'DB Shoulder Press',  defaultWeight: 35, unit: 'lbs', sets: 3 },
    { name: 'Lateral Raises',     defaultWeight: 10, unit: 'lbs', sets: 3 },
    { name: 'Front Raises',       defaultWeight: 10, unit: 'lbs', sets: 3 },
    { name: 'Rear Delt Fly',      defaultWeight: 10, unit: 'lbs', sets: 3 },
  ],
  arms: [
    { name: 'Bicep Curl',              defaultWeight: 25, unit: 'lbs', sets: 2 },
    { name: 'Hammer Curl',             defaultWeight: 25, unit: 'lbs', sets: 2 },
    { name: 'Overhead Tricep Ext.',    defaultWeight: 20, unit: 'lbs', sets: 2 },
    { name: 'Tricep Kickback',         defaultWeight: 15, unit: 'lbs', sets: 2 },
  ],
  core: [
    { name: 'Plank',         defaultWeight: null, unit: 'sec', sets: 2 },
    { name: 'Side Plank',    defaultWeight: null, unit: 'sec/side', sets: 2 },
    { name: 'Russian Twist', defaultWeight: null, unit: 'reps', sets: 2 },
  ]
};

let setsState = {};
let totalSets = 0;
let completedSets = 0;
let workoutStartTime = null;
let timerInterval = null;
let timerSeconds = 90;
let timerRunning = false;

function buildSection(sectionId, exercises) {
  const container = document.getElementById(sectionId);
  exercises.forEach((ex, idx) => {
    const key = sectionId + '_' + idx;
    setsState[key] = Array(ex.sets).fill(false);
    totalSets += ex.sets;

    const card = document.createElement('div');
    card.className = 'exercise-card';

    // Build per-set rows
    let tableRows = '';
    for (let s = 0; s < ex.sets; s++) {
      const weightCell = ex.defaultWeight !== null
        ? `<input class="weight-input" id="wt_${key}_${s}" type="number" value="${ex.defaultWeight}" min="0"> <span class="unit-label">${ex.unit}</span>`
        : `<input class="reps-input" id="wt_${key}_${s}" type="number" placeholder="—"> <span class="unit-label">${ex.unit}</span>`;

      tableRows += `
        <tr>
          <td><button class="set-btn active" id="setbtn_${key}_${s}" onclick="toggleSet('${key}',${s})">S${s+1}</button></td>
          <td>${weightCell}</td>
          <td><input class="reps-input" id="reps_${key}_${s}" type="number" placeholder="reps" min="1"></td>
        </tr>`;
    }

    card.innerHTML = `
      <div class="ex-name">${ex.name}</div>
      <div class="ex-meta">${ex.sets} sets</div>
      <table class="sets-table">
        <thead><tr>
          <th style="width:46px">Set</th>
          <th>Weight</th>
          <th>Reps</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
      <div class="notes-toggle" onclick="toggleNotes('notes_${key}', this)">📝 Add note</div>
      <div class="notes-area" id="notes_${key}">
        <textarea placeholder="Form cues, how it felt, next session goal…"></textarea>
      </div>
    `;
    container.appendChild(card);
  });
}

function toggleNotes(id, el) {
  const area = document.getElementById(id);
  const visible = area.style.display === 'block';
  area.style.display = visible ? 'none' : 'block';
  el.textContent = visible ? '📝 Add note' : '📝 Hide note';
}

function toggleSet(key, setIdx) {
  if (!workoutStartTime) workoutStartTime = Date.now();
  setsState[key][setIdx] = !setsState[key][setIdx];
  const btn = document.getElementById(`setbtn_${key}_${setIdx}`);
  if (setsState[key][setIdx]) {
    btn.classList.remove('active');
    btn.classList.add('done');
    btn.textContent = '✓';
    completedSets++;
    startTimer();
  } else {
    btn.classList.remove('done');
    btn.classList.add('active');
    btn.textContent = 'S' + (setIdx + 1);
    completedSets--;
  }
  updateProgress();
}

function updateProgress() {
  const pct = totalSets > 0 ? (completedSets / totalSets) * 100 : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${completedSets} of ${totalSets} sets complete`;
  if (completedSets === totalSets && totalSets > 0) showComplete();
}

function showComplete() {
  const banner = document.getElementById('complete-banner');
  banner.style.display = 'block';
  const elapsed = workoutStartTime ? Math.round((Date.now() - workoutStartTime) / 60000) : 0;
  document.getElementById('complete-time').textContent = `Total time: ~${elapsed} min`;
  stopTimer();
}

function setTimer(s) { timerSeconds = s; stopTimer(); renderTimerVal(timerSeconds); document.getElementById('timer-display').style.color = '#022F65'; }
function startTimer() {
  if (timerRunning) { stopTimer(); }
  timerRunning = true;
  let s = timerSeconds;
  document.getElementById('timer-display').style.color = '#022F65';
  timerInterval = setInterval(() => {
    s--;
    if (s <= 0) { s = 0; stopTimer(); document.getElementById('timer-display').style.color = '#00D686'; }
    renderTimerVal(s);
  }, 1000);
}
function stopTimer() { clearInterval(timerInterval); timerRunning = false; }
function resetTimer() { stopTimer(); renderTimerVal(timerSeconds); document.getElementById('timer-display').style.color = '#022F65'; }
function renderTimerVal(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  document.getElementById('timer-display').textContent = `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function exportCSV() {
  const date = new Date().toLocaleDateString('en-CA');
  const rows = [['Date','Section','Exercise','Set','Weight','Unit','Reps','Notes']];

  const sections = [
    { id: 'shoulders', data: workoutData.shoulders },
    { id: 'arms',      data: workoutData.arms },
    { id: 'core',      data: workoutData.core },
  ];

  sections.forEach(sec => {
    sec.data.forEach((ex, idx) => {
      const key = sec.id + '_' + idx;
      const notes = (document.querySelector(`#notes_${key} textarea`)?.value || '').replace(/"/g,'""');
      for (let s = 0; s < ex.sets; s++) {
        const done   = setsState[key]?.[s] ? 'Y' : 'N';
        const weight = document.getElementById(`wt_${key}_${s}`)?.value || '';
        const reps   = document.getElementById(`reps_${key}_${s}`)?.value || '';
        const unit   = ex.unit || '';
        rows.push([date, sec.id, ex.name, `Set ${s+1} (${done})`, weight, unit, reps, `"${notes}"`]);
      }
    });
  });

  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `workout_${date}.csv`;
  a.click();
}

function resetWorkout() {
  if (!confirm('Reset all progress?')) return;
  location.reload();
}

document.getElementById('date-display').textContent = new Date().toLocaleDateString('en-CA', { weekday:'short', month:'short', day:'numeric' });

buildSection('shoulders', workoutData.shoulders);
buildSection('arms', workoutData.arms);
buildSection('core', workoutData.core);
updateProgress();
renderTimerVal(timerSeconds);
</script>
</body>
</html>
